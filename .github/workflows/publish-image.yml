name: publish-frontend-image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image identity
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Manual frontend image publishing must run from master"
            exit 1
          fi

          image_sha="${IMAGE_SHA}"
          image_sha="${image_sha#sha-}"
          if ! printf '%s' "${image_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "::error::IMAGE_SHA must be a full 40-character commit SHA"
            exit 1
          fi
          echo "IMAGE_SHA=${image_sha}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${image_sha:0:7}" >> "$GITHUB_ENV"
        env:
          IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/chasepassion/parlasoul-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/chasepassion/parlasoul-frontend:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: deploy-frontend-production

on:
  workflow_run:
    workflows:
      - publish-frontend-image
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Optional image SHA to deploy (defaults to the latest published workflow SHA)"
        required: false
        type: string

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://parlasoul.com
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
      DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
      DEPLOY_HOST_KEY_FINGERPRINT: ${{ secrets.DEPLOY_HOST_KEY_FINGERPRINT }}
      IMAGE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.image_sha }}
    steps:
      - name: Normalize deployment settings
        run: |
          set -euo pipefail

          sanitize() {
            printf '%s' "$1" | tr -d '\r\n' | sed $'1s/^\xEF\xBB\xBF//'
          }

          {
            echo "DEPLOY_HOST=$(sanitize "${DEPLOY_HOST}")"
            echo "DEPLOY_USER=$(sanitize "${DEPLOY_USER}")"
            echo "DEPLOY_PASSWORD=$(sanitize "${DEPLOY_PASSWORD}")"
            echo "DEPLOY_ROOT=$(sanitize "${DEPLOY_ROOT}")"
            echo "DEPLOY_HOST_KEY_FINGERPRINT=$(sanitize "${DEPLOY_HOST_KEY_FINGERPRINT}")"
            echo "IMAGE_SHA=$(sanitize "${IMAGE_SHA}")"
          } >> "$GITHUB_ENV"

          normalized_sha="$(sanitize "${IMAGE_SHA}")"
          normalized_sha="${normalized_sha#sha-}"
          echo "IMAGE_TAG=sha-${normalized_sha:0:7}" >> "$GITHUB_ENV"

      - name: Validate deployment inputs
        run: |
          set -euo pipefail
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_PASSWORD DEPLOY_ROOT DEPLOY_HOST_KEY_FINGERPRINT; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required production secret: ${key}"
              exit 1
            fi
          done

          if [ -z "${IMAGE_SHA:-}" ]; then
            echo "::error::IMAGE_SHA is empty"
            exit 1
          fi

      - name: Install SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openssh-client sshpass

      - name: Pin production host key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -t ed25519 "$DEPLOY_HOST" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh-keygen -lf "$HOME/.ssh/known_hosts" | grep -F "$DEPLOY_HOST_KEY_FINGERPRINT"

      - name: Deploy frontend
        run: |
          set -euo pipefail
          export FRONTEND_IMAGE="ghcr.io/chasepassion/parlasoul-frontend:${IMAGE_TAG}"

          sshpass -p "$DEPLOY_PASSWORD" ssh \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "$DEPLOY_USER@$DEPLOY_HOST" /bin/bash <<EOF
          set -euo pipefail
          export FRONTEND_IMAGE="${FRONTEND_IMAGE}"
          cd "${DEPLOY_ROOT}"

          docker pull "${FRONTEND_IMAGE}"
          FRONTEND_IMAGE="${FRONTEND_IMAGE}" docker compose -f compose.yaml -f compose.production.yaml up -d --force-recreate frontend nginx

          deployed_revision="\$(docker inspect parlasoul-frontend-1 --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')"
          test "\${deployed_revision}" = "${IMAGE_SHA}"

          for attempt in \$(seq 1 20); do
            if curl -fsS https://parlasoul.com/login >/dev/null; then
              exit 0
            fi
            sleep 3
          done

          echo "Frontend health check did not pass in time" >&2
          exit 1
          EOF
